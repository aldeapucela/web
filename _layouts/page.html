<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">

    <title>{{ page.title }}</title>

    <!-- Metadatos para preview en redes sociales -->
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="La mayor comunidad vecinal online sobre Valladolid">
    <meta property="og:image" content="https://aldeapucela.org/img/social-preview.jpg">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta name="twitter:card" content="summary_large_image">

</head>

<body class="{% if page.slug %}page-{{ page.slug }}{% else %}default-page{% endif %}">
    <!-- Simple content wrapper for readable pages -->
    <div class="page-content">
        <div class="container content-container">
            {{ content }}
        </div>
    </div>

    <script>
        // Matomo
        var _paq = window._paq = window._paq || [];
        _paq.push(['trackPageView']);
        _paq.push(['enableLinkTracking']);
        (function () {
            var u = "https://stats.aldeapucela.org/";
            _paq.push(['setTrackerUrl', u + 'matomo.php']);
            _paq.push(['setSiteId', '13']);
            var d = document, g = d.createElement('script'), s = d.getElementsByTagName('script')[0];
            g.async = true; g.src = u + 'matomo.js'; s.parentNode.insertBefore(g, s);
        })();
    </script>
</body>

</html>
