    <use href="#feather" transform="translate(512 505) rotate(26) scale(1.0)"/>
    <use href="#feather" transform="translate(512 505) rotate(52) scale(0.9)"/>
    <use href="#feather" transform="translate(512 505) rotate(0) scale(1.08)"/>

    <!-- Camera -->
    <rect x="648" y="500" width="64" height="30" rx="13" fill="#66517D"/>
    <rect x="418" y="458" width="188" height="90" rx="22" fill="#66517D"/>
    <rect x="262" y="520" width="500" height="298" rx="56" fill="#66517D"/>

    <!-- Flash window -->
    <rect x="300" y="558" width="76" height="46" rx="14" fill="#1E9E8A"/>

    <!-- Lens = peacock feather eye -->
    <circle cx="512" cy="668" r="146" fill="#ffffff"/>
    <circle cx="512" cy="668" r="130" fill="#1E9E8A"/>
    <circle cx="512" cy="668" r="92" fill="#ffffff"/>
    <circle cx="512" cy="668" r="64" fill="#66517D"/>
