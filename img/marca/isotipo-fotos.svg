               C 30 -232 48 -252 42 -288
               C 36 -320 20 -338 0 -346
               C -20 -338 -36 -320 -42 -288
               C -48 -252 -30 -232 -12 -192
               C -8 -150 -8 -80 0 0 Z" fill="#1E9E8A"/>
      <ellipse cx="0" cy="-283" rx="34" ry="46" fill="#ffffff"/>
      <ellipse cx="0" cy="-285" rx="20" ry="30" fill="#66517D"/>
      <circle cx="-8" cy="-298" r="8" fill="#ffffff" opacity="0.85"/>
